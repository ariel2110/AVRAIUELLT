name: Deploy — Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Vault bridge
    runs-on: ubuntu-latest
    # Only deploy when CI passed
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /root/vault   # adjust if repo was cloned elsewhere

            echo "→ Pulling latest code…"
            git pull origin main

            echo "→ Rebuilding bridge service…"
            # Never restart 'db' — Postgres data must survive deploys.
            docker compose up -d --build --no-deps bridge

            echo "→ Checking bridge is running…"
            sleep 8
            docker compose ps bridge | grep -q "Up" || \
              (echo "ERROR: bridge container not running" ; docker compose logs --tail=20 bridge ; exit 1)

            echo "→ Deploy complete ✓"
